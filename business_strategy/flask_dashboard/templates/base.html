<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroRetain // Enterprise Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-page:    #0f172a;
            --bg-card:    #1e293b;
            --bg-elev:    #334155;
            --fg-text:    #f1f5f9;
            --fg-muted:   #cbd5e1;   /* a11y: >=4.5:1 on --bg-page */
            --fg-dim:     #94a3b8;
            --accent:     #38bdf8;
            --success:    #22c55e;
            --danger:     #ef4444;
            --warning:    #f59e0b;
            --border:     #475569;
        }
        body { background-color: var(--bg-page); color: var(--fg-text); font-family: system-ui, -apple-system, sans-serif; }
        h1, h2, h3, h4, h5, h6, p, label, span, td, th, strong, small, div { color: inherit; }
        .text-muted    { color: var(--fg-muted) !important; }
        .text-white-50 { color: var(--fg-muted) !important; }
        .sidebar { background-color: var(--bg-card); min-height: 100vh; border-right: 1px solid var(--border); }
        .nav-link { color: var(--fg-muted); border-radius: 0.375rem; margin-bottom: 0.25rem; }
        .nav-link:hover, .nav-link.active { background-color: var(--bg-elev); color: #fff; }
        .card-custom { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--fg-text); }

        /* Form controls: dark backgrounds with visible text + dropdown arrow.
           Bootstrap's default form-control/form-select use --bs-body-color which
           inherits from <body>, but Chrome on Windows renders the *control* with
           a near-black text color regardless. Force a light color + custom arrow. */
        .form-control, .form-select {
            background-color: var(--bg-elev);
            color: var(--fg-text);
            border: 1px solid var(--border);
        }
        .form-control::placeholder { color: var(--fg-dim); }
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-elev);
            color: var(--fg-text);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.25);
        }
        .form-select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='none' stroke='%23cbd5e1' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3E%3C/svg%3E");
        }
        .form-select option { background-color: var(--bg-card); color: var(--fg-text); }

        .kpi-val { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .kpi-tile-label { color: var(--fg-muted); margin-bottom: 0.25rem; }
        .kpi-tile-sub { color: var(--fg-muted); font-size: 0.85rem; margin-top: 0.25rem; opacity: 0.85; }

        /* BCG table: solid colored cells need WHITE text, not the matching
           colored text (text-success on bg-success = invisible). */
        .bcg-cell { color: #fff; }
        .bcg-cell .small { color: rgba(255, 255, 255, 0.85); }

        /* Pill badges on dark theme: bump contrast */
        .badge { font-weight: 600; letter-spacing: 0.02em; }

        /* Tables inside dark cards: avoid Bootstrap default striped-row conflicts */
        .table { color: var(--fg-text); }
        .table > :not(caption) > * > * { background-color: transparent; color: var(--fg-text); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-3 d-flex flex-column">
            <h4 class="text-white fw-bold mb-4 pt-2">✈️ AeroRetain AI</h4>
            <hr class="text-secondary">
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/" class="nav-link {% if active_page == 'overview' %}active{% endif %}">📊 Executive Overview</a></li>
                <li><a href="/strategy" class="nav-link {% if active_page == 'strategy' %}active{% endif %}">🎯 Strategic Frameworks</a></li>
                <li><a href="/stats" class="nav-link {% if active_page == 'stats' %}active{% endif %}">🔬 Statistical Analytics</a></li>
                <li><a href="/predict" class="nav-link {% if active_page == 'predict' %}active{% endif %}">🧠 ML Prediction Engine</a></li>
            </ul>
            <div class="text-muted small">System Environment: Production v1.1</div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>
